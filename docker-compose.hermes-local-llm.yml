name: ${HERMES_COMPOSE_PROJECT_NAME:-hermes-local-llm}

services:
  hermes:
    image: ${HERMES_AGENT_IMAGE:-nousresearch/hermes-agent:latest}
    container_name: ${HERMES_CONTAINER_NAME:-hermes}
    restart: unless-stopped
    user: "${HERMES_UID:-1000}:${HERMES_GID:-1000}"

    volumes:
      - ${HERMES_HOME_DIR:-./.hermes}:/opt/data
      - ${HERMES_SEED_DIR:-./.hermes-runtime-example}:/opt/local-llm-hermes-runtime:ro
      - ${HERMES_TUI_DIST_DIR:-./.hermes-local-llm-hostuid-ui-tui-dist}:/opt/hermes/ui-tui/dist
      - ${HERMES_REPO_DIR:-.}:${HERMES_REPO_MOUNT:-/workspace/local-llm-server}:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro

    ports:
      - "127.0.0.1:${HERMES_API_PORT:-8642}:8642"
      - "127.0.0.1:${HERMES_DASHBOARD_PORT:-9119}:9119"

    environment:
      HERMES_UID: "${HERMES_UID:-1000}"
      HERMES_GID: "${HERMES_GID:-1000}"
      HERMES_HOME: /opt/data
      HOME: /tmp/hermes-browser
      AGENT_BROWSER_EXECUTABLE_PATH: "${AGENT_BROWSER_EXECUTABLE_PATH:-/opt/hermes/.playwright/chromium_headless_shell-1217/chrome-headless-shell-linux64/chrome-headless-shell}"
      PLAYWRIGHT_BROWSERS_PATH: "${PLAYWRIGHT_BROWSERS_PATH:-/opt/hermes/.playwright}"
      PATH: /opt/hermes/.venv/bin:/opt/hermes/node_modules/.bin:/opt/data/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: "8642"
      API_SERVER_KEY: "${API_SERVER_KEY:?Set API_SERVER_KEY in .env or pass it to docker compose}"
      API_SERVER_CORS_ORIGINS: "${API_SERVER_CORS_ORIGINS:-http://localhost:3000,http://localhost:8080,http://localhost:5173}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-http://host.docker.internal:18080/v1}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-local-not-required}"
      GATEWAY_ALLOW_ALL_USERS: "${GATEWAY_ALLOW_ALL_USERS:-true}"

      HERMES_DASHBOARD: "1"
      HERMES_DASHBOARD_HOST: 0.0.0.0
      HERMES_DASHBOARD_PORT: "9119"
      HERMES_DASHBOARD_TUI: "1"
      HERMES_OVERWRITE_CONFIG: "${HERMES_OVERWRITE_CONFIG:-0}"
      HERMES_REPO_DIR: "${HERMES_REPO_DIR:-.}"
      HERMES_REPO_MOUNT: "${HERMES_REPO_MOUNT:-/workspace/local-llm-server}"
      TERMINAL_DOCKER_VOLUMES: '["${HERMES_REPO_DIR:-.}:${HERMES_REPO_MOUNT:-/workspace/local-llm-server}:ro"]'

    group_add:
      - "${DOCKER_GID:-1001}"

    extra_hosts:
      - "host.docker.internal:host-gateway"

    entrypoint:
      - /bin/bash
      - -c
    command:
      - |
        set -euo pipefail

        seed_file() {
          local source_file="$1"
          local target_file="$2"
          if [[ ! -f "$$source_file" ]]; then
            return
          fi
          if [[ ! -f "$$target_file" ]]; then
            cp "$$source_file" "$$target_file"
            echo "Seeded $${target_file}"
            return
          fi
          if [[ "$${HERMES_OVERWRITE_CONFIG:-0}" =~ ^(1|true|TRUE|True|yes|YES|Yes)$$ ]]; then
            backup_file="$${target_file}.bak.$$(date -u +%Y%m%d_%H%M%S)"
            cp "$$target_file" "$$backup_file"
            cp "$$source_file" "$$target_file"
            echo "Overwrote $${target_file}; backup saved to $${backup_file}"
            return
          fi
          echo "Keeping existing $${target_file}; set HERMES_OVERWRITE_CONFIG=1 to reseed"
        }

        seed_file /opt/local-llm-hermes-runtime/config.yaml /opt/data/config.yaml
        seed_file /opt/local-llm-hermes-runtime/SOUL.md /opt/data/SOUL.md
        mkdir -p /opt/data/{cron,sessions,logs,hooks,memories,skills,skins,plans,workspace,home}
        mkdir -p "$${HOME}/.local/bin"
        ln -sf /opt/hermes/.venv/bin/hermes "$${HOME}/.local/bin/hermes"

        if [[ ! -f /opt/data/.env ]]; then
          umask 077
          {
            printf 'API_SERVER_KEY=%s\n' "$${API_SERVER_KEY}"
            printf 'API_SERVER_CORS_ORIGINS=%s\n' "$${API_SERVER_CORS_ORIGINS}"
            printf 'OPENAI_BASE_URL=%s\n' "$${OPENAI_BASE_URL}"
            printf 'OPENAI_API_KEY=%s\n' "$${OPENAI_API_KEY}"
            printf 'GATEWAY_ALLOW_ALL_USERS=%s\n' "$${GATEWAY_ALLOW_ALL_USERS:-true}"
          } > /opt/data/.env
          echo "Created /opt/data/.env"
        else
          echo "Keeping existing /opt/data/.env"
        fi

        ensure_env_key() {
          local key="$1"
          local value="$2"
          if ! grep -q "^$${key}=" /opt/data/.env; then
            printf '%s=%s\n' "$${key}" "$${value}" >> /opt/data/.env
            echo "Added $${key} to /opt/data/.env"
          fi
        }

        ensure_env_key API_SERVER_KEY "$${API_SERVER_KEY}"
        ensure_env_key API_SERVER_CORS_ORIGINS "$${API_SERVER_CORS_ORIGINS}"
        ensure_env_key OPENAI_BASE_URL "$${OPENAI_BASE_URL}"
        ensure_env_key OPENAI_API_KEY "$${OPENAI_API_KEY}"
        ensure_env_key GATEWAY_ALLOW_ALL_USERS "$${GATEWAY_ALLOW_ALL_USERS:-true}"

        if [[ "$${HERMES_DASHBOARD:-}" =~ ^(1|true|TRUE|True|yes|YES|Yes)$$ ]]; then
          dash_host="$${HERMES_DASHBOARD_HOST:-0.0.0.0}"
          dash_port="$${HERMES_DASHBOARD_PORT:-9119}"
          dash_args=(--host "$$dash_host" --port "$$dash_port" --no-open)
          if [[ "$$dash_host" != "127.0.0.1" && "$$dash_host" != "localhost" ]]; then
            dash_args+=(--insecure)
          fi
          /opt/hermes/.venv/bin/hermes dashboard "$${dash_args[@]}" &
        fi
        exec /opt/hermes/.venv/bin/hermes gateway run

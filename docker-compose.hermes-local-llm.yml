name: ${HERMES_COMPOSE_PROJECT_NAME:-hermes-local-llm}

services:
  hermes:
    image: ${HERMES_AGENT_IMAGE:-nousresearch/hermes-agent:latest}
    container_name: ${HERMES_CONTAINER_NAME:-hermes}
    restart: unless-stopped
    user: "${HERMES_UID:-1000}:${HERMES_GID:-1000}"

    volumes:
      - ${HERMES_HOME_DIR:-./.hermes}:/opt/data
      - ${HERMES_SEED_DIR:-./.hermes-runtime-example}:/opt/local-llm-hermes-runtime:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro

    ports:
      - "127.0.0.1:${HERMES_API_PORT:-8642}:8642"
      - "127.0.0.1:${HERMES_DASHBOARD_PORT:-9119}:9119"

    environment:
      HERMES_UID: "${HERMES_UID:-1000}"
      HERMES_GID: "${HERMES_GID:-1000}"
      HERMES_HOME: /opt/data
      HOME: /tmp/hermes-browser
      AGENT_BROWSER_EXECUTABLE_PATH: "${AGENT_BROWSER_EXECUTABLE_PATH:-}"
      PATH: /opt/hermes/.venv/bin:/opt/hermes/node_modules/.bin:/opt/data/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: "8642"
      API_SERVER_KEY: "${API_SERVER_KEY:?Set API_SERVER_KEY in .env or pass it to docker compose}"
      API_SERVER_CORS_ORIGINS: "${API_SERVER_CORS_ORIGINS:-http://localhost:3000,http://localhost:8080,http://localhost:5173}"

      HERMES_DASHBOARD: "1"
      HERMES_DASHBOARD_HOST: 0.0.0.0
      HERMES_DASHBOARD_PORT: "9119"
      HERMES_DASHBOARD_TUI: "1"

    group_add:
      - "${DOCKER_GID:-1001}"

    extra_hosts:
      - "host.docker.internal:host-gateway"

    entrypoint:
      - /bin/bash
      - -lc
    command:
      - |
        set -euo pipefail
        cp /opt/local-llm-hermes-runtime/config.yaml /opt/data/config.yaml
        if [[ -f /opt/local-llm-hermes-runtime/SOUL.md ]]; then
          cp /opt/local-llm-hermes-runtime/SOUL.md /opt/data/SOUL.md
        fi
        mkdir -p /opt/data/{cron,sessions,logs,hooks,memories,skills,skins,plans,workspace,home}
        if [[ "$${HERMES_DASHBOARD:-}" =~ ^(1|true|TRUE|True|yes|YES|Yes)$$ ]]; then
          dash_host="$${HERMES_DASHBOARD_HOST:-0.0.0.0}"
          dash_port="$${HERMES_DASHBOARD_PORT:-9119}"
          dash_args=(--host "$$dash_host" --port "$$dash_port" --no-open)
          if [[ "$$dash_host" != "127.0.0.1" && "$$dash_host" != "localhost" ]]; then
            dash_args+=(--insecure)
          fi
          /opt/hermes/.venv/bin/hermes dashboard "$${dash_args[@]}" &
        fi
        exec /opt/hermes/.venv/bin/hermes gateway run

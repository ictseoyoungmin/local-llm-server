services:
  llama:
    command:
      - -m
      - ${LLAMA_MODEL_PATH:-/models/model.gguf}
      - --mmproj
      - ${LLAMA_MMPROJ_PATH:-/models/mmproj.gguf}
      - --host
      - ${LLAMA_HOST:-0.0.0.0}
      - --port
      - ${LLAMA_PORT:-8080}
      - --ctx-size
      - ${LLAMA_CTX_SIZE:-8192}
      - --threads
      - ${LLAMA_THREADS:-8}
      - --parallel
      - ${LLAMA_PARALLEL:-1}
